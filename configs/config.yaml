# Configuration files for wildlife conservation tools

## Data Configuration
data:
  n_samples: 1000
  n_regions: 50
  seed: 42
  threat_rate: 0.3  # Target threat rate
  
# Feature engineering parameters
features:
  interaction_features: true
  temporal_features: true
  spatial_features: true
  risk_features: true
  
# Model configurations
models:
  logistic_regression:
    max_iter: 1000
    C: 1.0
    
  random_forest:
    n_estimators: 100
    max_depth: 10
    min_samples_split: 5
    
  xgboost:
    n_estimators: 100
    max_depth: 6
    learning_rate: 0.1
    subsample: 0.8
    colsample_bytree: 0.8
    
  lightgbm:
    n_estimators: 100
    max_depth: 6
    learning_rate: 0.1
    subsample: 0.8
    colsample_bytree: 0.8
    
  neural_network:
    hidden_dims: [64, 32, 16]
    dropout_rate: 0.3
    learning_rate: 0.001
    epochs: 100
    batch_size: 32

# Evaluation parameters
evaluation:
  test_size: 0.2
  val_size: 0.1
  cv_folds: 5
  
# Visualization settings
visualization:
  colors:
    low_risk: "#2E8B57"
    high_risk: "#DC143C"
    medium_risk: "#FFD700"
    background: "#F5F5F5"
  
  map_settings:
    zoom_start: 8
    tiles: "OpenStreetMap"
    
  plot_settings:
    figure_size: [12, 8]
    dpi: 300
